<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>황제 L'Empereur - 웹 플레이어</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#080810; }
body { font-family:'Malgun Gothic',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
header { width:100%; max-width:1040px; padding:14px 24px 10px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #1a1a30; }
header h1 { font-size:18px; font-weight:700; letter-spacing:4px; color:#a0b8f0; }
header span { font-size:11px; color:#1a1a30; letter-spacing:2px; }
#game-wrap { width:100%; max-width:1024px; margin:16px auto 0; aspect-ratio:4/3; }
#game { width:100%; height:100%; }
.info { width:100%; max-width:1024px; margin:10px auto 0; display:flex; align-items:center; gap:12px; padding:0 4px; font-size:11px; color:#1a1a30; }
.hint { margin-left:auto; }
footer { margin:24px auto; font-size:10px; color:#1a1a30; letter-spacing:2px; }
</style>
</head>
<body>
<header>
  <h1>L'EMPEREUR</h1>
  <span>황제 L'Empereur · KOEI 1990</span>
</header>
<div id="game-wrap">
  <div id="game"></div>
</div>
<div class="info">
  <span>💾 세이브 데이터 자동 보존</span>
  
</div>
<footer>KOEI 1990 · EmulatorJS · 세이브 데이터 브라우저 자동 보존</footer>

<script>
window.EJS_player = '#game';
window.EJS_core = 'dosbox';
window.EJS_gameUrl = './game.zip';
window.EJS_gameName = 'LEMPEREUR';
window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
window.EJS_startOnLoaded = true;
window.EJS_color = '#a0b8f0';
window.EJS_Buttons = {
  playPause: true,
  restart: true,
  mute: true,
  settings: true,
  fullscreen: true,
  saveState: true,
  loadState: true,
  screenRecord: false,
  gamepad: true,
  cheat: false,
  volume: true,
  saveSavFiles: true,
  loadSavFiles: true,
  screenShot: false,
  cacheManager: false,
};
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
